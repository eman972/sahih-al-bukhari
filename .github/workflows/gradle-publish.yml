name: Publish Java to Maven Central (Gradle)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build + test only, no publish)'
        required: false
        default: 'false'

jobs:
  publish:
    name: Build, Test & Publish (Gradle)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Java 11
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.3.1

      - name: Make gradlew executable
        run: |
          chmod +x java/gradlew
          git update-index --chmod=+x java/gradlew

      - name: Build and test
        working-directory: java
        run: ./gradlew clean test

      - name: Publish to Maven Central
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: java
        run: ./gradlew publish -x test
        env:
          OSSRH_USERNAME:  ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD:  ${{ secrets.OSSRH_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE:  ${{ secrets.GPG_PASSPHRASE }}

      - name: Build fat-JAR (CLI)
        working-directory: java
        run: ./gradlew shadowJar

      - name: Upload fat-JAR to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2.2.1
        with:
          files: java/build/libs/sahih-al-bukhari-*-all.jar