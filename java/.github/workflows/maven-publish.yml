name: Publish Java to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build + test only, no publish)'
        required: false
        default: 'false'

jobs:
  publish:
    name: Build, Test & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      # pom.xml reads ../data/bukhari.json.gz automatically — no copy step needed.
      - name: Build and test
        working-directory: java
        run: mvn --batch-mode --no-transfer-progress clean verify

      - name: Publish to Maven Central
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: java
        run: mvn --batch-mode --no-transfer-progress deploy -P release -DskipTests
        env:
          MAVEN_USERNAME:       ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD:       ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build fat-JAR (CLI)
        working-directory: java
        run: mvn --batch-mode --no-transfer-progress package -P fat-jar -DskipTests

      - name: Upload fat-JAR to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: java/target/sahih-al-bukhari-*-fat.jar
